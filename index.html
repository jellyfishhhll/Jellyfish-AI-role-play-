<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AI Roleplay 角色生成器</title>
<style>
body { font-family: "Microsoft YaHei", sans-serif; background:#fdf6f0; padding:20px; }
h1 { text-align:center; color:#f08c82; }
.container { max-width: 700px; margin:auto; background:#fff6f3; padding:25px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.1);}
label { font-weight:bold; display:block; margin-top:15px; }
input[type="text"] { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #e0c6c0; font-size:14px; }
.button-group { display:flex; gap:10px; flex-wrap: wrap; margin-top:10px; }
.button-group button { padding:10px 15px; border-radius:8px; border:1px solid #f08c82; background:#fff; cursor:pointer; transition:0.2s; flex:1; }
.button-group button.selected { background:#f08c82; color:white; }
.button-group button:hover { background:#f7c1b5; }
.result { margin-top:25px; padding:20px; background:#fff0eb; border-radius:8px; line-height:1.6; }
</style>
</head>
<body>
<h1>AI Roleplay 角色生成器（静态版）</h1>
<div class="container">

    <!-- 姓名输入 -->
    <label>角色姓名:</label>
    <input type="text" id="charName" placeholder="输入角色姓名">

    <!-- 性别选择 -->
    <label>选择性别:</label>
    <div class="button-group" id="genderGroup">
        <button data-gender="男">男</button>
        <button data-gender="女">女</button>
        <button data-gender="其他">其他</button>
    </div>

    <!-- 职业选择 -->
    <label>选择职业:</label>
    <div class="button-group" id="jobGroup">
        <button>医生</button>
        <button>学生</button>
        <button>冒险者</button>
        <button>同事</button>
        <button>艺术家</button>
    </div>

    <!-- 性格选择 -->
    <label>选择性格（最多3个）:</label>
    <div class="button-group" id="personalityGroup">
        <button>冷淡</button>
        <button>温柔</button>
        <button>危险感</button>
        <button>克制</button>
        <button>淘气</button>
        <button>热情</button>
        <button>理智</button>
        <button>胆小</button>
        <button>活泼</button>
    </div>

    <!-- 场景选择 -->
    <label>选择场景:</label>
    <div class="button-group" id="sceneGroup">
        <button>深夜</button>
        <button>雨天</button>
        <button>电梯</button>
        <button>医院</button>
        <button>办公室</button>
    </div>

    <button style="margin-top:20px; background:#f08c82; color:white; border:none; padding:10px 20px; border-radius:8px;" onclick="generateCharacter()">生成角色</button>

    <div class="result" id="output" style="display:none;"></div>
</div>

<script>
// 状态变量
let selectedGender = "";
let selectedJob = "";
let selectedPersonality = [];
let selectedScene = "";

// 性别选择
document.querySelectorAll("#genderGroup button").forEach(btn=>{
    btn.addEventListener("click",()=>{
        document.querySelectorAll("#genderGroup button").forEach(b=>b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedGender = btn.dataset.gender;
    });
});

// 职业选择
document.querySelectorAll("#jobGroup button").forEach(btn=>{
    btn.addEventListener("click",()=>{
        document.querySelectorAll("#jobGroup button").forEach(b=>b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedJob = btn.textContent;
    });
});

// 性格选择
document.querySelectorAll("#personalityGroup button").forEach(btn=>{
    btn.addEventListener("click",()=>{
        const text = btn.textContent;
        if(btn.classList.contains("selected")){
            btn.classList.remove("selected");
            selectedPersonality = selectedPersonality.filter(p=>p!==text);
        } else {
            if(selectedPersonality.length>=3){ alert("最多选择3个性格"); return; }
            btn.classList.add("selected");
            selectedPersonality.push(text);
        }
    });
});

// 场景选择
document.querySelectorAll("#sceneGroup button").forEach(btn=>{
    btn.addEventListener("click",()=>{
        document.querySelectorAll("#sceneGroup button").forEach(b=>b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedScene = btn.textContent;
    });
});

// 内容库（丰富版）
const appearanceText = ["黑色长发，杏仁眼，穿着宽松卫衣","金色短发，碧眼，戴着眼镜，穿衬衫","棕色卷发，深褐色眼睛，穿运动服","银白长发，淡蓝眼，穿风衣"];
const actionText = ["轻轻敲着桌面","微笑看着你","双手抱胸，略显冷淡","低声哼唱，动作优雅","偷偷玩手指"];
const sceneText = {
    "深夜":["街灯下的影子拉长，他静静站在窗边。","夜深人静，办公室里只剩键盘声。"],
    "雨天":["雨滴打在窗户，他撑伞静静走来。","雨水反射街灯，他轻轻呼吸。"],
    "电梯":["电梯狭小，他侧身看你。","按钮灯光映照脸庞，微微阴影。"],
    "医院":["值班灯光下，他专注翻阅病历。","空荡走廊里，脚步声回响，他安静如空气。"],
    "办公室":["文件堆旁，他整理资料，动作精准。","灯光下，他偶尔抬眼瞥你。"]
};
const jobText = {
    "医生":["擅长精准操作，语气温和","常穿白大褂，动作干净利落"],
    "学生":["喜欢记录笔记，偶尔迟到","背着书包，动作轻快"],
    "冒险者":["动作敏捷，眼神警觉","随时检查装备，步伐坚定"],
    "同事":["处理文件快速，偶尔关心他人","穿着职业装，动作利落"],
    "艺术家":["喜欢观察细节，充满想象力","随手涂鸦，动作灵动"]
};

// 生成角色
function generateCharacter(){
    const name = document.getElementById("charName").value || "角色";
    if(!selectedGender){ alert("请选择性别"); return; }
    if(!selectedJob){ alert("请选择职业"); return; }
    if(selectedPersonality.length===0){ alert("请选择至少一个性格"); return; }
    if(!selectedScene){ alert("请选择场景"); return; }

    // 随机外貌
    const appearance = appearanceText[Math.floor(Math.random()*appearanceText.length)];
    // 随机行为
    const actions = actionText[Math.floor(Math.random()*actionText.length)];
    // 场景画面
    const sceneDesc = sceneText[selectedScene][Math.floor(Math.random()*sceneText[selectedScene].length)];
    // 职业特征
    const jobDesc = jobText[selectedJob][Math.floor(Math.random()*jobText[selectedJob].length)];

    // 输出角色设定
    const output = `<strong>角色姓名:</strong> ${name} (${selectedGender})<br>
<strong>职业:</strong> ${selectedJob}<br>
<strong>性格标签:</strong> ${selectedPersonality.join(" / ")}<br>
<strong>外貌特征:</strong> ${appearance}<br>
<strong>行为习惯:</strong> ${actions}, ${jobDesc}<br>
<strong>场景画面示例:</strong> ${sceneDesc}<br>
<strong>开场白:</strong> "${actions}"，他对你说。`;

    const outDiv = document.getElementById("output");
    outDiv.style.display="block";
    outDiv.innerHTML = output;
}
</script>
